name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: release smoke guards
        run: python3 scripts/release_smoke_test.py

  test-linux:
    name: Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test
        run: cargo test --workspace

  test-macos:
    name: Test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test
        run: cargo test --workspace

  test-windows:
    name: Test (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test
        run: cargo test --workspace

  build-release:
    name: Build Release (${{ matrix.target }})
    needs: [check, test-linux, test-macos, test-windows]
    if: github.ref == 'refs/heads/master'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            python: python3
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
            python: python3
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            python: python
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Resolve workspace release version
        id: release-version
        shell: bash
        run: |
          version="$(cargo metadata --format-version 1 --no-deps | \
            ${{ matrix.python }} -c 'import json, sys; data = json.load(sys.stdin); versions = {package["version"] for package in data["packages"]}; assert len(versions) == 1, f"workspace package versions differ: {sorted(versions)}"; print(versions.pop())')"
          printf 'version=%s\n' "${version}" >> "${GITHUB_OUTPUT}"
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package Unix release
        if: matrix.archive == 'tar.gz'
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          package="blit-${TARGET}"
          bin_dir="target/${TARGET}/release"
          stage="${RUNNER_TEMP}/${package}"
          archive="dist/${package}.tar.gz"
          checksum="${archive}.sha256"

          test -x "${bin_dir}/blit"
          test -x "${bin_dir}/blit-daemon"
          test ! -e "${stage}"
          mkdir -p "${stage}" dist
          cp "${bin_dir}/blit" "${stage}/"
          cp "${bin_dir}/blit-daemon" "${stage}/"
          cp README.md LICENSE CHANGELOG.md "${stage}/"
          printf '%s\n' "${GITHUB_SHA}" > "${stage}/BUILD.txt"
          tar -C "${RUNNER_TEMP}" -czf "${archive}" "${package}"
          python3 -c 'import hashlib, pathlib, sys; p = pathlib.Path(sys.argv[1]); print(f"{hashlib.sha256(p.read_bytes()).hexdigest()}  {p.name}")' "${archive}" > "${checksum}"
          test -s "${archive}"
          test -s "${checksum}"
      - name: Package Windows release
        if: matrix.archive == 'zip'
        shell: pwsh
        env:
          TARGET: ${{ matrix.target }}
        run: |
          $ErrorActionPreference = "Stop"
          $package = "blit-$env:TARGET"
          $binDir = Join-Path "target" "$env:TARGET/release"
          $stage = Join-Path $env:RUNNER_TEMP $package
          $archive = Join-Path "dist" "$package.zip"
          $checksum = "$archive.sha256"

          foreach ($binary in @("blit.exe", "blit-daemon.exe")) {
            $path = Join-Path $binDir $binary
            if (-not (Test-Path -LiteralPath $path -PathType Leaf)) {
              throw "required release binary is missing: $path"
            }
          }
          if (Test-Path -LiteralPath $stage) {
            throw "release staging path already exists: $stage"
          }
          New-Item -ItemType Directory -Path $stage | Out-Null
          New-Item -ItemType Directory -Path "dist" -Force | Out-Null
          Copy-Item -LiteralPath (Join-Path $binDir "blit.exe") -Destination $stage
          Copy-Item -LiteralPath (Join-Path $binDir "blit-daemon.exe") -Destination $stage
          Copy-Item -LiteralPath "README.md", "LICENSE", "CHANGELOG.md" -Destination $stage
          Set-Content -LiteralPath (Join-Path $stage "BUILD.txt") -Value $env:GITHUB_SHA
          Compress-Archive -Path $stage -DestinationPath $archive
          $hash = (Get-FileHash -LiteralPath $archive -Algorithm SHA256).Hash.ToLowerInvariant()
          Set-Content -LiteralPath $checksum -Value "$hash  $package.zip"
          foreach ($path in @($archive, $checksum)) {
            if (-not (Test-Path -LiteralPath $path -PathType Leaf) -or
                (Get-Item -LiteralPath $path).Length -eq 0) {
              throw "required release artifact is missing or empty: $path"
            }
          }
      - name: Smoke packaged release
        run: >-
          ${{ matrix.python }} scripts/release_smoke.py
          --archive dist/blit-${{ matrix.target }}.${{ matrix.archive }}
          --checksum dist/blit-${{ matrix.target }}.${{ matrix.archive }}.sha256
          --expected-version ${{ steps.release-version.outputs.version }}
          --expected-commit ${{ github.sha }}
      - name: Upload release archive
        uses: actions/upload-artifact@v6
        with:
          name: blit-${{ matrix.target }}
          path: |
            dist/blit-${{ matrix.target }}.${{ matrix.archive }}
            dist/blit-${{ matrix.target }}.${{ matrix.archive }}.sha256
          if-no-files-found: error
