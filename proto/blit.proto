syntax = "proto3";
package blit.v2;

// The main service for all data transfer and remote management operations.
service Blit {
  // ONE_TRANSFER_PATH (otp-1): the single role-tagged transfer session.
  // Contract: docs/TRANSFER_SESSION.md. This is the ONLY byte-moving
  // RPC. Deleted at cutover (otp-10c-2, D-2026-07-05-1): rpc Push and
  // rpc PullSync, with every message only they referenced (their
  // exclusive frame sets, DataTransferNegotiation, the old summaries,
  // and TransferOperationSpec.metadata_only — the relay scan flag,
  // whose caller was removed at otp-10c-1). Earlier deletion, same
  // rule: rpc Pull (2026-07-03, ue-r2-1h). No bridge, no
  // version-tolerance — same-build peers only (D-2026-07-05-2).
  rpc Transfer(stream TransferFrame) returns (stream TransferFrame);

  // Lists contents of a remote directory.
  rpc List(ListRequest) returns (ListResponse);

  // Deletes files/directories on the server for mirror operations.
  rpc Purge(PurgeRequest) returns (PurgeResponse);

  // Provides path completion suggestions for a given remote path prefix.
  rpc CompletePath(CompletionRequest) returns (CompletionResponse);

  // Lists the available modules on the server.
  rpc ListModules(ListModulesRequest) returns (ListModulesResponse);

  // Recursively finds files/directories starting at a module path.
  rpc Find(FindRequest) returns (stream FindEntry);

  // Summarises disk usage for a subtree (du-style).
  rpc DiskUsage(DiskUsageRequest) returns (stream DiskUsageEntry);

  // Reports module/storage capacity information (df-style).
  rpc FilesystemStats(FilesystemStatsRequest) returns (FilesystemStatsResponse);

  // Destination-side delegated initiator. The CLI calls this on the
  // destination daemon when both endpoints in a `blit copy` are
  // remote. The destination daemon validates the request through the
  // delegation gate, opens its own pull against the named source, and
  // streams progress/results back to the CLI. Bytes flow source→dst
  // directly; the CLI is not in the byte path.
  //
  // See docs/plan/REMOTE_REMOTE_DELEGATION_PLAN.md for the design
  // (gate ordering, allowlist semantics, client_capabilities
  // override boundary).
  rpc DelegatedPull(DelegatedPullRequest) returns (stream DelegatedPullProgress);

  // Daemon-state snapshot for the TUI's F1 (Daemons) and F2
  // (Transfers) panes, plus `blit jobs list <remote>`. Always
  // available regardless of `--metrics`; see §6.4 of
  // docs/plan/TUI_DESIGN.md. Counters read from the
  // TransferMetrics atomics (so they're zero when the flag is
  // off), but active[] / recent[] always populate from the
  // always-on ActiveJobs table introduced in milestone B.
  rpc GetState(GetStateRequest) returns (DaemonState);

  // Cancel a daemon-side in-flight transfer by transfer_id.
  // M-Jobs of docs/plan/TUI_DESIGN.md §6.5. Every kind that can
  // hold an active row — served/delegated sessions of either role —
  // supports cancellation (D-2026-07-04-3): the daemon fires the
  // row's cancellation token and the dispatcher races it, so an
  // attached transfer tears down promptly and its still-connected
  // client receives a terminal CANCELLED status.
  //
  // Status semantics:
  //   OK                    → the cancellation token was fired;
  //                           the handler will tear down on its
  //                           next .await resolve.
  //   NOT_FOUND             → no active transfer matches the
  //                           requested transfer_id (already
  //                           completed, or never existed).
  //   FAILED_PRECONDITION   → the transfer exists but its kind's
  //                           dispatch policy gates cancellation
  //                           off. Only the history-only pull kind
  //                           (RPC deleted) is gated, and no active
  //                           row of that kind can exist — a
  //                           contract escape hatch, not an
  //                           expected outcome.
  rpc CancelJob(CancelJobRequest) returns (CancelJobResponse);

  // Clear the daemon's recent-transfers list (GetState.recent[]).
  // Wipes the in-memory recent-runs ring AND its persisted backing
  // store (recents.jsonl). It deliberately does NOT touch the
  // planner/predictor's historical telemetry (perf_local.jsonl) —
  // that is a separate store and the operator clearing their recents
  // view must never degrade prediction quality. rec-2 of the
  // recent-persistence feature.
  //
  // Status semantics:
  //   OK → recents cleared. ClearRecentResponse.cleared carries the
  //        number of entries removed from the in-memory ring.
  rpc ClearRecent(ClearRecentRequest) returns (ClearRecentResponse);

  // Server-streaming subscription to live daemon events. Used by the
  // TUI's F2 (Transfers) pane and by future `blit jobs watch` callers
  // that want a push stream rather than `GetState` polling.
  //
  // c-2-subscribe-skeleton lands the wire surface with a single event
  // variant (TransferStarted) and the daemon-side broadcast channel.
  // Subsequent C sub-slices fan more variants into the oneof
  // (TransferProgress, TransferComplete, TransferError,
  // ModuleListChanged, DaemonHeartbeat) and add `transfer_id_filter`
  // / `replay_recent` request fields. The field numbers in
  // `DaemonEvent.payload` are stable; new variants append.
  //
  // Slow consumers receive a `gRPC Status::Aborted` on the stream
  // (the daemon's broadcast channel dropped events while they fell
  // behind). TUI consumers handle this by re-subscribing and
  // refreshing snapshot state via `GetState`.
  rpc Subscribe(SubscribeRequest) returns (stream DaemonEvent);
}

// Removed: `BlitAuth` service stub (2026-05-13). Original design
// reserved an `Authenticate(token) -> bool` RPC for a future token
// auth layer. Removed entirely from 0.1.0 scope — the trust model is
// "operator network controls + per-transfer data-plane tokens"
// (`docs/DAEMON_CONFIG.md` Trust Model). If a real auth scheme is
// ever needed, design it from scratch rather than retain a misleading
// stub.

// --- Message Definitions ---

// ── ue-r2-1b: receiver capacity profile ─────────────────────────────
// The rich profile the byte RECEIVER advertises to the byte SENDER at
// setup. The sender owns the live dial (chunk size, prefetch, in-flight
// bytes, and — after ue-r2-2 — stream count) and must keep it within
// this profile; the initial dial additionally starts BELOW the ceiling
// with margin (REV4 "Risks": a receiver may over-advertise, and there
// is no probe phase to catch it before the first byte).
//
// Travel direction (receiver → sender): the session DESTINATION
// advertises its profile in SessionOpen/SessionAccept.receiver_capacity
// (whichever end plays DESTINATION); a delegated trigger also carries
// one in TransferOperationSpec.receiver_capacity, which the dst daemon
// REPLACES with its own before initiating (same override boundary as
// client_capabilities).
//
// Every field uses 0 (or UNSPECIFIED) as "unknown"; the sender treats
// unknown as "no information — stay conservative", never as "unlimited".
message CapacityProfile {
  // Logical CPU cores the receiver can devote to this transfer.
  uint32 cpu_cores = 1;
  // Storage class of the receive target, the coarse drain-speed signal.
  DrainClass drain_class = 2;
  // Receiver's current overall load estimate, percent (0-100+; may
  // exceed 100 when oversubscribed, e.g. loadavg > cores). 0 = unknown
  // or idle — senders must not distinguish the two.
  uint32 load_percent = 3;
  // Maximum parallel data-plane streams the receiver will accept for
  // this transfer (the dial's hard ceiling; floor is always 1).
  // 0 = unknown → sender stays at today's negotiated stream_count.
  uint32 max_streams = 4;
  // Estimated sustainable drain (write-to-storage) rate in bytes/sec.
  uint64 drain_rate_bytes_per_sec = 5;
  // Largest single chunk the receiver wants on the wire, bytes.
  uint64 max_chunk_bytes = 6;
  // Ceiling on prefetch / un-acked in-flight bytes the receiver can
  // buffer safely.
  uint64 max_inflight_bytes = 7;
}

// Coarse storage class for CapacityProfile.drain_class. Deliberately
// coarse: a hint for the sender's starting dial, not a benchmark.
enum DrainClass {
  DRAIN_CLASS_UNSPECIFIED = 0;
  DRAIN_CLASS_HDD = 1;
  DRAIN_CLASS_SSD_SATA = 2;
  DRAIN_CLASS_SSD_NVME = 3;
  DRAIN_CLASS_NETWORK_FS = 4; // receive target is itself remote (NFS/SMB/…)
  DRAIN_CLASS_MEMORY = 5;     // tmpfs/ramdisk-class target
}

// ── ue-r2-1b: mid-transfer stream resize (consumed at ue-r2-2) ──────
// Control-plane request to grow/shrink the live data-plane stream set.
// Carried on the transfer control streams (never as a blind TCP
// data-plane record), and only when the session negotiated resize
// support at open.
// Shape carried over from the adaptive-streams PR3 prior art (d9d4ec7).
enum DataPlaneResizeOp {
  DATA_PLANE_RESIZE_OP_UNSPECIFIED = 0;
  DATA_PLANE_RESIZE_OP_ADD = 1;
  DATA_PLANE_RESIZE_OP_REMOVE = 2;
}

// Controller → peer request to resize the live stream set. `epoch` is a
// monotonic resize id (0 is reserved for the initial streams);
// `target_stream_count` is the absolute desired live count (idempotent),
// bounded by CapacityProfile.max_streams. For ADD, `sub_token` is the
// 16-byte credential the newly dialed data socket must present after
// the one_time_token; the accepting side registers it before the dialer
// dials. For REMOVE, sub_token is empty.
message DataPlaneResize {
  DataPlaneResizeOp op = 1;
  uint32 epoch = 2;
  uint32 target_stream_count = 3;
  bytes sub_token = 4;
}

// Ack of a DataPlaneResize. `accepted` is false if the peer could not
// honor it (e.g. registration refused, dial failed);
// `effective_stream_count` is the live count the acking side now
// believes is in effect.
message DataPlaneResizeAck {
  uint32 epoch = 1;
  uint32 effective_stream_count = 2;
  bool accepted = 3;
}

// Shared transfer frames (session manifest / payload building blocks).
message FileHeader {
  string relative_path = 1;
  uint64 size = 2;
  int64 mtime_seconds = 3;
  uint32 permissions = 4;
  bytes checksum = 5;  // Blake3 hash (32 bytes), empty if not computed
}

message FileData {
  bytes content = 1;
}

message TarShardHeader {
  repeated FileHeader files = 1;
  uint64 archive_size = 2;
}

message TarShardChunk {
  bytes content = 1;
}

message TarShardComplete {}

message ManifestComplete {
  // R59 #1 F1: the SOURCE tells the DESTINATION whether its scan
  // finished cleanly. False when any subtree was unreadable
  // (EACCES, ELOOP, IO errors). Required for safe mirror purges —
  // the session refuses an incomplete-scan mirror, and refuses
  // outright when the open set require_complete_scan (otp-9b F1).
  bool scan_complete = 1;
}
// Progress: enumeration discovered X files (reused by
// DelegatedPullProgress and TransferProgress).
message ManifestBatch {
  uint64 file_count = 1;
  uint64 total_bytes = 2;
}

// Block-level resume messages
message BlockHashList {
  string relative_path = 1;              // File this applies to
  uint32 block_size = 2;                 // Size of each block (last may be smaller)
  repeated bytes hashes = 3;             // Blake3 hashes (32 bytes each), in order
}

message BlockTransfer {
  string relative_path = 1;              // File this block belongs to
  uint64 offset = 2;                     // Byte offset in file
  bytes content = 3;                     // Block data
}

message BlockTransferComplete {
  string relative_path = 1;              // File that's now complete
  uint64 total_bytes = 2;                // Final file size (for truncation if needed)
}

message ListRequest { string module = 1; string path = 2; }
message ListResponse { repeated FileInfo entries = 1; }
message FileInfo {
  string name = 1;
  bool is_dir = 2;
  uint64 size = 3;
  int64 mtime_seconds = 4;
}

message PurgeRequest { string module = 1; repeated string paths_to_delete = 2; }
message PurgeResponse { uint64 files_deleted = 1; }

message CompletionRequest {
  string module = 1;
  string path_prefix = 2;
  bool include_files = 3;
  bool include_directories = 4;
}
message CompletionResponse { repeated string completions = 1; }

message ListModulesRequest {}
message ListModulesResponse { repeated ModuleInfo modules = 1; }
message ModuleInfo {
    string name = 1;
    string path = 2;
    bool read_only = 3;
}

message FindRequest {
  string module = 1;
  string start_path = 2;
  string pattern = 3;
  bool case_sensitive = 4;
  bool include_files = 5;
  bool include_directories = 6;
  uint32 max_results = 7;
}

message FindEntry {
  string relative_path = 1;
  bool is_dir = 2;
  uint64 size = 3;
  int64 mtime_seconds = 4;
}

message DiskUsageRequest {
  string module = 1;
  string start_path = 2;
  uint32 max_depth = 3;
}

message DiskUsageEntry {
  string relative_path = 1;
  uint64 byte_total = 2;
  uint64 file_count = 3;
  uint64 dir_count = 4;
}

message FilesystemStatsRequest {
  string module = 1;
}

message FilesystemStatsResponse {
  string module = 1;
  uint64 total_bytes = 2;
  uint64 used_bytes = 3;
  uint64 free_bytes = 4;
}

// Removed 2026-05-13: AuthRequest / AuthResponse — see BlitAuth note above.

// ─────────────────────────────────────────────────────────────────────
// TransferOperationSpec — the unified contract handed from initiator
// to origin for every transfer (push, pull, mirror, remote→remote).
// The wire shape — typed enums and orthogonal fields, not bool soup.
// Receivers normalize this via `NormalizedTransferOperation::from_spec`
// at the boundary; downstream code never sees raw proto-`Unspecified`
// or unknown enum values.
// ─────────────────────────────────────────────────────────────────────

// What the initiator tells the origin about a transfer. Normalized
// intent — not a flag bag. Identical regardless of whether the origin
// is the local CLI (push), a remote daemon (pull), or daemon A talking
// to daemon B (remote→remote, future).
message TransferOperationSpec {
  // Bumped when the wire shape of this message or any of its fields
  // changes in a way that requires the receiver to know. Receivers
  // should reject specs with a version they don't understand.
  //
  // History:
  //   1: original (pre-0.1.0).
  //   2: added `require_complete_scan` (R49-F2). Bumped so v1
  //      daemons fail closed when receiving a v2 spec instead of
  //      silently ignoring the safety-critical field.
  //   2 (unchanged, ue-r2-1b): added `receiver_capacity` WITHOUT a
  //      bump. Receivers enforce spec_version by exact match, so a
  //      bump would make old daemons reject new clients outright.
  //      The field is a pure optimization hint: an old daemon
  //      skipping it keeps today's static behavior, which is the
  //      intended mixed-version outcome — nothing safety-critical
  //      is lost, unlike the v2 case.
  uint32 spec_version = 1;

  // Origin-side module name. Empty means "use default root export".
  string module = 2;

  // Path within the origin's module, relative to the module root.
  // Empty means "the module root itself" (single-file source).
  string source_path = 3;

  // User-supplied filter rules. Applies during origin enumeration so
  // filtered files never appear in the payload stream. Identical
  // semantics to the CLI's `--exclude/--include/--min-size/--max-size/
  // --min-age/--max-age/--files-from` flags.
  FilterSpec filter = 4;

  // How the origin's DiffPlanner decides whether a file on the target
  // matches the source. Affects which payloads the origin emits.
  ComparisonMode compare_mode = 5;

  // Whether and how the target should delete extraneous files. Only
  // meaningful when this is a mirror operation; ignored for plain copy.
  MirrorMode mirror_mode = 6;

  // Resume / block-level transfer settings. When disabled the origin
  // emits only File / TarShard payloads; when enabled it may emit
  // FileBlock / FileBlockComplete pairs for changed files.
  ResumeSettings resume = 7;

  // What the initiator's side of the wire supports. Lets the origin
  // pick payload shapes the target can handle (e.g. fall back from
  // tar shards if the client is older).
  PeerCapabilities client_capabilities = 8;

  // Request that the origin route bulk file bytes through the gRPC
  // control plane instead of negotiating a TCP data plane. Useful for
  // diagnostics and for environments where the data plane port can't
  // be reached. Origin still honors filter/compare/mirror/resume; only
  // the byte transport changes.
  bool force_grpc = 9;

  // When true, the origin skips any file the target already has,
  // regardless of comparison mode. Orthogonal to compare_mode: this
  // controls "should we look at this file at all?" while compare_mode
  // controls "given that we're looking, do the bytes match?". The
  // CLI rejects `--ignore-existing` combined with `--force` since
  // those are semantically contradictory.
  bool ignore_existing = 10;

  // R49-F2: initiator signals "the source will be deleted after this
  // transfer succeeds" (the `blit move` case). The origin daemon must
  // refuse the operation if its source-side scan was incomplete
  // (e.g. EACCES on a child directory), because a partial scan
  // combined with downstream source-deletion would silently lose
  // files we couldn't read. Independent of mirror_mode — move never
  // sets mirror_mode (it would purge dest extras), but it carries
  // the same scan-completeness requirement that mirror does.
  bool require_complete_scan = 11;

  // ue-r2-1b: the byte receiver's capacity profile on the delegated
  // trigger (the destination daemon receives the bytes). The session
  // itself negotiates capacity in SessionOpen/SessionAccept.
  //
  // OVERRIDE BOUNDARY (same rule as client_capabilities): in
  // delegation the byte recipient is the destination daemon, not the
  // CLI, so the destination handler REPLACES this field with its own
  // profile before forwarding the spec to the source. Any
  // CLI-supplied value is non-authoritative.
  //
  // Absent = old client or nothing to advertise → the sender keeps
  // today's static/conservative behavior. Added at spec_version 2
  // without a bump (see the spec_version history note).
  CapacityProfile receiver_capacity = 12;

}

// Source-side filter rules. Applied at the origin's TransferSource
// enumeration via FilteredSource, before DiffPlanner sees a header.
message FilterSpec {
  // Whitelist patterns. When empty, no whitelist is applied. When
  // non-empty, a file must match at least one include pattern to pass.
  repeated string include = 1;

  // Blacklist patterns. Always applied; files matching any exclude
  // are dropped regardless of include matches.
  repeated string exclude = 2;

  // Size constraints in bytes. Unset means no constraint.
  optional uint64 min_size = 3;
  optional uint64 max_size = 4;

  // Age constraints in seconds, evaluated against the origin's clock
  // at the moment the spec is processed. Unset means no constraint.
  optional uint64 min_age_secs = 5;
  optional uint64 max_age_secs = 6;

  // Explicit file list. When non-empty, only listed relative paths
  // pass — all other rules above are bypassed for the inclusion test.
  // Currently inline; may move to a streamed manifest if list sizes
  // become a concern.
  repeated string files_from = 7;
}

// How the origin decides which files need transfer when both sides
// have the file. Orthogonal to `ignore_existing`, which controls
// whether the comparison happens at all for already-present files.
enum ComparisonMode {
  // Reserved: previously COMPARISON_MODE_IGNORE_EXISTING, removed in
  // favor of the orthogonal `ignore_existing` field on
  // TransferOperationSpec. No future variant should reuse number 5.
  reserved 5;
  reserved "COMPARISON_MODE_IGNORE_EXISTING";

  // Treat as SIZE_MTIME (the historical default).
  COMPARISON_MODE_UNSPECIFIED = 0;
  // Match if size and mtime (within tolerance) agree.
  COMPARISON_MODE_SIZE_MTIME = 1;
  // Match only on Blake3 hash equality. Slower; bytes-accurate.
  COMPARISON_MODE_CHECKSUM = 2;
  // Match if sizes are equal — ignore mtime. Useful for copies that
  // touch mtime as a side effect.
  COMPARISON_MODE_SIZE_ONLY = 3;
  // Always transfer; ignore both size and mtime on the target side.
  COMPARISON_MODE_IGNORE_TIMES = 4;
  // Transfer regardless of target state. Equivalent to dest is empty.
  COMPARISON_MODE_FORCE = 6;
}

// What "mirror" means for files the target has but the source filter
// scope doesn't include. Resolves F4 from the 2026-05-01 review by
// making the choice explicit at the wire boundary.
enum MirrorMode {
  // Treat as OFF.
  MIRROR_MODE_UNSPECIFIED = 0;
  // No mirror deletions; copy/update only.
  MIRROR_MODE_OFF = 1;
  // Mirror only within the filter's scope: target files matching the
  // filter are deleted if absent from source; target files outside the
  // filter are left alone. Default for `blit mirror --include …`.
  MIRROR_MODE_FILTERED_SUBSET = 2;
  // Mirror the full target tree against the (filtered) source: target
  // files are deleted whenever they're absent from the source set the
  // filter produces. Use when the user genuinely wants "destination
  // exactly mirrors filtered source".
  MIRROR_MODE_ALL = 3;
}

message ResumeSettings {
  // When false, origin emits only whole-file payloads. When true,
  // origin may emit FileBlock + FileBlockComplete for changed files.
  bool enabled = 1;
  // Block size in bytes. 0 means "origin chooses" (currently 1 MiB).
  uint32 block_size = 2;
}

// Peer capability advertisement. Used during initial spec exchange so
// the origin can emit only payload shapes the target understands.
// Receivers default missing fields to false (not supported).
message PeerCapabilities {
  bool supports_resume = 1;
  bool supports_tar_shards = 2;
  bool supports_data_plane_tcp = 3;
  // Receiver implements the FilterSpec pipeline chokepoint
  // (FilteredSource on its origin-side TransferSource). Senders set
  // this to true; older receivers that didn't honor filter rules
  // will not.
  bool supports_filter_spec = 4;
  // ue-r2-1b: the byte recipient can drive mid-transfer stream
  // resize (dial new data sockets on DataPlaneResize ADD, retire
  // receive workers on REMOVE). The responder folds this into its
  // resize gate. Same-build peers both set it (D-2026-07-05-2).
  bool supports_stream_resize = 5;
}

// ─────────────────────────────────────────────────────────────────────
// Delegated Pull — direct daemon-to-daemon byte path for remote→remote
// transfers. See docs/plan/REMOTE_REMOTE_DELEGATION_PLAN.md.
// ─────────────────────────────────────────────────────────────────────

message DelegatedPullRequest {
  // ── Destination-side fields (this daemon) ─────────────────────────
  // Module on this (destination) daemon to write into. Resolved
  // through the same module table push uses; F2 canonical-path
  // containment applies to dst_destination_path.
  string dst_module = 1;
  string dst_destination_path = 2;

  // ── Source-side / universal contract ──────────────────────────────
  // Where this daemon should pull from. Strictly typed; arbitrary URI
  // schemes are rejected during locator parsing.
  RemoteSourceLocator src = 10;

  // The universal transfer contract. Reuses TransferOperationSpec
  // including FilterSpec, ComparisonMode, MirrorMode, ResumeSettings,
  // force_grpc, ignore_existing, and spec_version. Receivers normalize
  // via NormalizedTransferOperation::from_spec exactly like push/pull.
  //
  // OVERRIDE BOUNDARY: spec.client_capabilities describes the byte
  // recipient's capabilities. In delegation, the byte recipient is
  // the destination daemon, not the CLI. The destination handler
  // mandatorily REPLACES client_capabilities with its own
  // PeerCapabilities before forwarding the spec to the source —
  // any CLI-supplied value here is non-authoritative. Every other
  // field flows through unchanged.
  TransferOperationSpec spec = 20;

  // Diagnostics-only.
  bool trace_data_plane = 31;

  // Detach the transfer from the calling client.
  //
  // When false (the historical behavior), the destination
  // daemon races the transfer against `tx.closed()` so a CLI
  // disconnect drops the in-flight pull future and the data
  // plane tears down (R30-F2).
  //
  // When true, the `tx.closed()` race disarms: the
  // destination daemon owns the transfer through completion,
  // failure, or `CancelJob(transfer_id)`. The CLI is free to
  // exit immediately after the daemon's `Started` event
  // arrives — useful for long-running remote→remote
  // transfers that should outlive the operator's shell
  // session.
  //
  // Only valid on `DelegatedPull` (the daemon-to-daemon byte
  // path). Any route with a local endpoint puts the CLI in the
  // byte path — detach is meaningless there because the CLI
  // disconnecting drops the bytes. The CLI rejects `--detach`
  // for those routes; the daemon-side flag is therefore
  // unused on non-delegated kinds.
  bool detach = 32;
}

message RemoteSourceLocator {
  // Strict Blit remote endpoint. The daemon parses this through the
  // same RemoteEndpoint code the CLI uses; rejects schemes other than
  // the Blit gRPC control-plane scheme.
  string host = 1;
  uint32 port = 2;

  // Field 10 was `bytes delegated_credential` (forward-compat
  // auth-passthrough hook for the removed BlitAuth service).
  // Removed 2026-05-13 — auth is out of project scope. Reserved
  // so it can't be reused for unrelated semantics by accident.
  reserved 10;
  reserved "delegated_credential";
}

message DelegatedPullProgress {
  oneof payload {
    DelegatedPullStarted started = 1;
    ManifestBatch        manifest_batch = 2; // existing message reuse
    BytesProgress        bytes_progress = 3;
    DelegatedPullSummary summary = 4;
    DelegatedPullError   error = 5;
  }
}

message DelegatedPullStarted {
  // Diagnostic: the source-side data-plane endpoint this daemon's
  // pull client observed (its remote-socket peer). "tcp:host:port"
  // when TCP data plane is used; "grpc-fallback" otherwise.
  // Informational only — the load-bearing byte-path-isolation
  // assertion in tests is the CLI-side byte counter.
  string source_data_plane_endpoint = 1;
  uint32 stream_count = 2;
  // Daemon-assigned transfer id (from the ActiveJobs table).
  // Stable for the lifetime of the transfer; used by
  // `blit jobs cancel <remote> <transfer_id>` and by
  // `--detach` callers that exit after the Started event.
  // Empty when the daemon is older than m-jobs-3.
  string transfer_id = 3;
}

message BytesProgress {
  // Cumulative values for the delegated transfer so far. Receivers that feed
  // delta-oriented progress renderers must subtract the last observed values.
  uint64 files_completed = 1;
  uint64 files_total = 2;
  uint64 bytes_completed = 3;
  uint64 bytes_total = 4;
}

message DelegatedPullSummary {
  // The old per-direction summary shape plus a delegation-specific
  // diagnostic field.
  uint64 files_transferred = 1;
  uint64 bytes_transferred = 2;
  uint64 bytes_zero_copy = 3;
  bool   tcp_fallback_used = 4;
  uint64 entries_deleted = 5;

  // Diagnostic: the data-plane peer address this dst observed when
  // connecting to src. Useful for operator audit logs. Not a proof of
  // byte-path isolation.
  string source_peer_observed = 6;
}

message DelegatedPullError {
  string upstream_message = 1;

  enum Phase {
    UNKNOWN = 0;
    DELEGATION_REJECTED = 1; // gate denied (master switch / allowlist / per-module override)
    CONNECT_SOURCE = 2;      // dst could not reach src
    NEGOTIATE = 3;           // src refused dst (auth/ACL/handshake)
    TRANSFER = 4;            // mid-transfer pull failure
    APPLY = 5;               // dst-side apply failure (containment, disk, perms)
  }
  Phase phase = 2;
}

// ─────────────────────────────────────────────────────────────────────
// GetState — daemon snapshot. See §6.3 of docs/plan/TUI_DESIGN.md.
// ─────────────────────────────────────────────────────────────────────

message GetStateRequest {
  // Maximum number of recent[] entries to return. 0 = use the
  // daemon's default (50). Ignored if larger than what the daemon
  // is tracking; the response simply contains all rows the ring
  // currently holds.
  uint32 recent_limit = 1;
}

message DaemonState {
  // Daemon's own version (CARGO_PKG_VERSION), e.g. "0.1.0".
  string version = 1;
  // Seconds since the daemon process started serving RPCs.
  uint64 uptime_seconds = 2;
  // Currently-exported modules. Reuses the existing ModuleInfo
  // message so clients that already render ListModules output can
  // reuse the same rendering pipeline.
  repeated ModuleInfo modules = 3;
  // Live transfers — populated from the always-on ActiveJobs table.
  // Not gated on `--metrics`; an operator can always ask the daemon
  // what it's doing right now.
  repeated ActiveTransfer active = 4;
  // Recent completed transfers, oldest-first. Bounded by the
  // daemon's recent-runs ring depth (default 50, configurable via
  // GetStateRequest.recent_limit). Drained when the ring fills.
  repeated TransferRecord recent = 5;
  // Counter snapshot. Reads from the TransferMetrics atomics —
  // when `--metrics` is off the atomics never incremented, so all
  // fields are zero. active[] and recent[] are independent of this
  // and remain populated.
  Counters counters = 6;
  // Mirrors the mDNS TXT advertisement: whether the daemon will
  // accept inbound DelegatedPull requests.
  bool delegation_enabled = 7;
}

// What kind of transfer an ActiveTransfer or TransferRecord row
// represents. Defined at top level (not nested under
// TransferStarted) so milestone C's Subscribe events can share the
// same enum without a cycle.
enum TransferKind {
  TRANSFER_KIND_UNSPECIFIED = 0;
  TRANSFER_KIND_PUSH = 1;
  // The deprecated Pull RPC was removed at ue-r2-1h (2026-07-03); no
  // new transfer produces this kind, but historical recent[] rows and
  // persisted recents.jsonl entries may still carry it, so the value
  // stays and renderers keep handling it.
  TRANSFER_KIND_PULL = 2;
  TRANSFER_KIND_PULL_SYNC = 3;
  TRANSFER_KIND_DELEGATED_PULL = 4;
}

message ActiveTransfer {
  string transfer_id = 1;
  TransferKind kind = 2;
  // `<ip>:<port>` of the connecting peer, or "unknown" when the
  // transport didn't surface one (in-process tests).
  string peer = 3;
  string module = 4;
  // Module-relative path the transfer targets. Empty until a served
  // session resolves its open frame; populated immediately for
  // delegated_pull (the only unary-request kind).
  string path = 5;
  uint64 start_unix_ms = 6;
  // Byte-level progress fields. Always zero in milestone B —
  // milestone C feeds them from the write-loop instrumentation.
  uint64 bytes_completed = 7;
  uint64 bytes_total = 8;
}

message TransferRecord {
  string transfer_id = 1;
  TransferKind kind = 2;
  string peer = 3;
  string module = 4;
  string path = 5;
  uint64 start_unix_ms = 6;
  // `drop_unix_ms - start_unix_ms`, saturating at zero so a
  // backwards clock jump can't underflow.
  uint64 duration_ms = 7;
  // Byte-level totals. Zero in milestone B — milestone C fills
  // them from the write-loop instrumentation.
  uint64 bytes = 8;
  uint64 files = 9;
  bool ok = 10;
  // Empty when ok=true. Otherwise the handler's Status::message()
  // for the failure, or a short "cancelled before outcome
  // recorded" marker when the spawn task didn't reach the
  // outcome-capture call.
  string error_message = 11;
}

message Counters {
  uint64 push_operations_total = 1;
  uint64 pull_operations_total = 2;
  uint64 purge_operations_total = 3;
  uint64 active_transfers = 4;
  uint64 transfer_errors_total = 5;
}

// ─────────────────────────────────────────────────────────────────────
// CancelJob — fire the cancellation token of an active transfer.
// See §6.5 of docs/plan/TUI_DESIGN.md.
// ─────────────────────────────────────────────────────────────────────

message CancelJobRequest {
  string transfer_id = 1;
}

message CancelJobResponse {
  // The transfer_id that was cancelled. Echoed back for the
  // CLI's confirmation message. Empty body otherwise — the
  // cancellation outcome (cancelled / unsupported / not found)
  // is encoded in the gRPC Status, not the response.
  string transfer_id = 1;
}

// ─────────────────────────────────────────────────────────────────────
// ClearRecent — wipe GetState.recent[] (in-memory ring + recents.jsonl).
// Never touches the planner's perf_local.jsonl. rec-2 of
// recent-persistence.
// ─────────────────────────────────────────────────────────────────────

message ClearRecentRequest {}

message ClearRecentResponse {
  // Number of recent entries removed from the in-memory ring.
  uint32 cleared = 1;
}

// ─────────────────────────────────────────────────────────────────────
// Subscribe — server-streaming live daemon events.
// See §6.2 of docs/plan/TUI_DESIGN.md.
// ─────────────────────────────────────────────────────────────────────

message SubscribeRequest {
  // Reserved for the event-category bitfield in a future slice
  // (TRANSFERS=1, ERRORS=2, MODULES=4, HEARTBEAT=8). Today
  // c-4 + c-2 + c-3 only emit transfer-family events, so the
  // mask has nothing to filter; field is parsed and ignored.
  // Locking the tag here keeps the wire shape stable.
  uint32 event_mask = 1;

  // c-5b: when true AND `transfer_id_filter` is non-empty,
  // the daemon replays the per-job event ring for the
  // targeted transfer (up to JOB_EVENT_RING_CAP recent events)
  // before forwarding live broadcast events. Lets a TUI that
  // connects mid-transfer pick up the bytes-completed history
  // without missing the early progress.
  //
  // No-op when `transfer_id_filter` is empty (no specific
  // ring to drain). No-op when set on its own (the row may
  // not exist yet); same row-not-found behavior as filter
  // alone.
  bool replay_recent = 2;

  // c-5a: when set, the daemon only forwards events whose
  // `transfer_id` matches this string. Empty means "every
  // transfer-related event" (the c-2/c-3/c-4 behavior).
  //
  // Filtering is applied daemon-side so a subscriber tracking
  // a single transfer doesn't pay the wire/CPU cost of every
  // other transfer's events. ModuleListChanged / DaemonHeartbeat
  // (future variants) are not transfer-scoped — they always
  // flow regardless of this filter.
  string transfer_id_filter = 3;
}

// One frame on the Subscribe stream. New event variants are added by
// appending to the oneof — field numbers are part of the wire
// contract. c-2-subscribe-skeleton ships only TransferStarted; future
// slices in milestone C add TransferProgress, TransferComplete,
// TransferError, ModuleListChanged, DaemonHeartbeat.
message DaemonEvent {
  oneof payload {
    TransferStarted  transfer_started  = 1;
    TransferProgress transfer_progress = 2;
    TransferComplete transfer_complete = 3;
    TransferError    transfer_error    = 4;
    // 5..6 reserved for ModuleListChanged, DaemonHeartbeat
    // (later C sub-slices).
  }
  reserved 5, 6;
}

// Fired when the daemon registers a new active transfer in its
// `ActiveJobs` table (the same registration that surfaces it in
// `GetState.active[]`). A served session fires this with empty
// `module`/`path` because those values arrive in the open frame, not
// at dispatch time — subscribers can reconcile via a follow-up
// GetState query if they need the populated endpoint before the
// transfer completes.
message TransferStarted {
  string transfer_id = 1;
  TransferKind kind = 2;
  // `<ip>:<port>` of the connecting peer, or "unknown" when the
  // transport didn't surface one (in-process tests).
  string peer = 3;
  // Module name on the daemon. Empty for streaming RPCs at
  // registration time — populated by GetState.active[] once the
  // first stream frame parses.
  string module = 4;
  // Module-relative path. Same "empty until first frame" caveat
  // as `module`.
  string path = 5;
  // Unix milliseconds at which the active row was registered.
  uint64 start_unix_ms = 6;
}

// Periodic chunk-granular progress for an in-flight transfer. The
// daemon fires one TransferProgress per active row per tick (default
// 10 Hz, see DEFAULT_PROGRESS_TICK_MS in service/core.rs) so a
// subscribed TUI can render a live byte-level progress bar without
// polling GetState.
//
// The bytes/files totals are absolute (cumulative since
// TransferStarted), not deltas — consumers that want per-tick rates
// subtract the previous observation. `throughput_bps` is the
// daemon-computed instantaneous rate over the most recent tick
// interval; a smoothed EWMA is a follow-up slice once we have an
// operator pain signal to justify the extra state.
message TransferProgress {
  string transfer_id = 1;
  // Cumulative bytes that landed on disk (same source as
  // GetState.active[].bytes_completed).
  uint64 bytes_completed = 2;
  // Total bytes expected, when known. 0 until a future C
  // sub-slice wires it from the manifest stage.
  uint64 bytes_total = 3;
  // Files completed; 0 until the files-counter slice wires it.
  uint64 files_completed = 4;
  // Total files expected; 0 until the manifest stage wires it.
  uint64 files_total = 5;
  // Instantaneous bytes-per-second over the most recent tick.
  // Future slice may replace with an EWMA so subscribers see
  // smoothed values; field name + semantic are forward-stable.
  uint64 throughput_bps = 6;
}

// Fired when a transfer drains successfully (`ActiveJobGuard`
// dropped with `record_outcome(ok=true, ...)`). Carries the
// terminal byte/file totals and the wall-clock duration. Pairs
// with `TransferStarted` to bracket a transfer's lifetime on the
// event stream.
message TransferComplete {
  string transfer_id = 1;
  // Cumulative bytes that landed on disk. Sourced from the
  // per-row atomic that c-1a/c-1b wired (the same value
  // `TransferRecord.bytes` carries at GetState.recent[]).
  uint64 bytes = 2;
  // Files completed. Always zero until a future C sub-slice
  // wires the files counter; field reserved here so subscribers
  // don't need a proto roll to render it.
  uint64 files = 3;
  uint64 duration_ms = 4;
  // True when the transfer fell back to the gRPC control plane
  // because the data plane couldn't be reserved. Always false
  // in this slice — a future C sub-slice plumbs the bit through
  // from the handler's result.
  bool tcp_fallback_used = 5;
}

// Fired when a transfer drains in a failure state
// (`ActiveJobGuard` dropped with `record_outcome(ok=false, ...)`
// or with no outcome recorded, e.g. spawn-task cancellation).
message TransferError {
  string transfer_id = 1;
  // Handler's failure message. Empty when the outcome was
  // recorded with no message; "cancelled before outcome
  // recorded" when the spawn task didn't reach the
  // record_outcome call.
  string message = 2;
}

// ═══════════════════════════════════════════════════════════════════
// ONE_TRANSFER_PATH unified session (otp-1 wire contract).
// Authoritative state machine + frame table: docs/TRANSFER_SESSION.md.
// The ONLY transfer choreography: Push and PullSync were deleted
// whole at cutover (otp-10c-2, D-2026-07-05-1); no bridge
// (D-2026-07-05-2: same-build peers only).
// ═══════════════════════════════════════════════════════════════════

// A transfer has a SOURCE role and a DESTINATION role. Which end
// initiated, and which CLI verb was used, select roles — never code.
enum TransferRole {
  TRANSFER_ROLE_UNSPECIFIED = 0;
  TRANSFER_ROLE_SOURCE = 1;
  TRANSFER_ROLE_DESTINATION = 2;
}

// First frame BOTH directions. Exact-match same-build handshake
// (D-2026-07-05-2): any inequality in either field is a
// SessionError{BUILD_MISMATCH} naming both ids, then close. No
// negotiate-down, no advisory fields, no capability bits.
message SessionHello {
  // "<crate version>+<git commit>[.dirty]", composed at compile time.
  string build_id = 1;
  // Bumped on any wire-shape change; exact match required.
  uint32 contract_version = 2;
}

// Initiator's second frame: the whole operation, roles included.
message SessionOpen {
  // Role the INITIATOR takes; the responder takes the other.
  TransferRole initiator_role = 1;
  // Responder-side module (empty = default root export) and path
  // within it. The initiator-side path never crosses the wire — the
  // initiator owns its local endpoint.
  string module = 2;
  string path = 3;
  FilterSpec filter = 4;
  ComparisonMode compare_mode = 5;
  // Mirror is explicit: enabled + scope. No implicit mirror.
  bool mirror_enabled = 6;
  MirrorMode mirror_kind = 7;
  ResumeSettings resume = 8;
  // Request the in-stream byte carrier (diagnostics / unreachable
  // data-plane environments). The responder may also force it via a
  // grant-less SessionAccept when it cannot bind a listener.
  bool in_stream_bytes = 9;
  bool ignore_existing = 10;
  bool require_complete_scan = 11;
  // Set iff the initiator is DESTINATION (dial contract: the byte
  // receiver advertises capacity — D-2026-06-20-1/-2; absent/0 =
  // unknown hardware value, conservative, never "old peer").
  CapacityProfile receiver_capacity = 12;
}

// Responder's reply. Refusals are SessionError frames, never silent
// closes.
message SessionAccept {
  // Set iff the responder is DESTINATION.
  CapacityProfile receiver_capacity = 1;
  // Absent = in-stream carrier (requested, or listener bind failed).
  DataPlaneGrant data_plane = 2;
}

// TCP data-plane grant. The RESPONDER always binds; the INITIATOR
// always dials (connection topology, not choreography — byte
// direction on the sockets is set by role: SOURCE writes).
message DataPlaneGrant {
  uint32 tcp_port = 1;
  bytes session_token = 2;
  // ACCEPT ceiling, not a dial order (D-2026-06-20-1/-2: the SENDER
  // owns the dial): the number of epoch-0 accept slots the responder
  // arms — min(engine dial floor, DESTINATION capacity ceiling).
  // SOURCE may dial fewer; unclaimed slots expire. Growth happens
  // only via SOURCE-initiated resize (sf-2 shape correction), one
  // armed accept per ADD epoch.
  uint32 initial_streams = 3;
  // Epoch-0 socket credential. Auth handshake per socket
  // (docs/TRANSFER_SESSION.md §Transport): session_token (16 bytes)
  // then epoch0_sub_token (16 bytes) for epoch-0 sockets;
  // session_token then the epoch's sub_token for resize-ADD sockets.
  // One socket per armed slot; unclaimed slots expire.
  bytes epoch0_sub_token = 4;
}

// DESTINATION → SOURCE: files the destination wants, in batches.
message NeedEntry {
  string relative_path = 1;
  // RELIABLE resume exception (docs/TRANSFER_SESSION.md): when true,
  // the destination's BlockHashList for this file follows, and the
  // source must not send any byte of this file before receiving it;
  // stale/mismatched partials fall back to full-file transfer.
  bool resume = 2;
}
message NeedBatch {
  repeated NeedEntry entries = 1;
}
// DESTINATION's promise that no further NeedBatch follows.
message NeedComplete {}

// SOURCE's promise that every requested payload byte is flushed.
message SourceDone {}

// DESTINATION → SOURCE at close: the end that wrote bytes and
// executed deletes attests to the outcome (one summary shape for
// every direction; it replaced the per-direction summaries at cutover).
message TransferSummary {
  uint64 files_transferred = 1;
  uint64 bytes_transferred = 2;
  uint64 entries_deleted = 3;   // mirror executed destination-local
  bool in_stream_carrier_used = 4;
  uint64 files_resumed = 5;
}

// Structured refusal/abort — an end says why before closing.
message SessionError {
  enum Code {
    SESSION_ERROR_UNSPECIFIED = 0;
    BUILD_MISMATCH = 1;
    MODULE_UNKNOWN = 2;
    READ_ONLY = 3;
    DELEGATION_REFUSED = 4;
    SCAN_INCOMPLETE = 5;
    PROTOCOL_VIOLATION = 6;
    DATA_PLANE_FAILED = 7;
    CANCELLED = 8;
    INTERNAL = 9;
    // otp-10b: the responder's operator disabled checksum hashing
    // (`--no-server-checksums` / `server_checksums_enabled = false`),
    // so a `COMPARISON_MODE_CHECKSUM` open is refused at OPEN — the
    // session never silently degrades a content-compare request to a
    // weaker mode (contract v3).
    CHECKSUM_DISABLED = 10;
  }
  Code code = 1;
  string message = 2;
  // BUILD_MISMATCH: both build ids, so the operator sees exactly
  // which end is stale.
  string local_build_id = 3;
  string peer_build_id = 4;
  // otp-7b-2 (D-2026-07-09-1 Q2 rider): the file the fault concerns,
  // when one is known (a mid-record read/write failure names its
  // file). OPTIONAL for explicit presence (codex 7b-2 G1): the empty
  // string is itself a valid identity — the single-file-root transfer
  // uses relative path "" — so absence must be distinguishable from
  // it. Lets the reporting end's end-of-operation summary name the
  // affected file structurally instead of string-scraping the message.
  optional string relative_path = 5;
}

// The single frame type BOTH wire directions carry. Which frames an
// end may send is determined by ROLE and phase
// (docs/TRANSFER_SESSION.md frame table — field numbers frozen
// there). Reuses the engine's existing payload vocabulary verbatim.
message TransferFrame {
  oneof frame {
    SessionHello hello = 1;
    SessionOpen open = 2;
    SessionAccept accept = 3;
    FileHeader manifest_entry = 4;
    ManifestComplete manifest_complete = 5;
    NeedBatch need_batch = 6;
    NeedComplete need_complete = 7;
    BlockHashList block_hashes = 8;
    FileHeader file_begin = 9;
    FileData file_data = 10;
    TarShardHeader tar_shard_header = 11;
    TarShardChunk tar_shard_chunk = 12;
    TarShardComplete tar_shard_complete = 13;
    BlockTransfer block = 14;
    BlockTransferComplete block_complete = 15;
    DataPlaneResize resize = 16;
    DataPlaneResizeAck resize_ack = 17;
    SourceDone source_done = 18;
    TransferSummary summary = 19;
    SessionError error = 20;
  }
}
